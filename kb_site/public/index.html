<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NPE KnowledgeBase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="main">
    <section class="card">
      <h1>NPE KnowledgeBase</h1>
      <p class="lead">Private member space for approved users.</p>
      <div class="row">
        <button id="btn-signin" class="btn primary">Email me a sign-in link</button>
        <a class="btn" href="member.html">Member area</a>
      </div>
      <p id="auth-status" class="notice"></p>
    </section>

    <section class="card" style="margin-top:1rem">
      <h2>Request access</h2>
      <form id="request-form">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="reason">Reason</label>
          <textarea id="reason" name="reason" required></textarea>
        </div>
        <button class="btn primary" type="submit">Submit request</button>
        <p id="request-status" class="notice"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
