project:
  type: website
  output-dir: _site
  resources:
    - data/

execute:
  engine: markdown

website:
  title: "Connor Conkey-Morrison"
  favicon: favicon.ico
  navbar:
    left:
      - text: Research
        menu:
          - href: research/index.qmd
            text: Overview
          - href: research/publications.qmd
            text: Publications
          - href: research/reading-list.qmd
            text: Reading List
          - href: research/projects.qmd
            text: Projects
          - href: posts/index.qmd
            text: Writing
      - text: Clinical
        menu:
          - href: clinical/index.qmd
            text: Overview
          - href: clinical/resources.qmd
            text: Resources
      - href: pages/npe-knowledgebase.qmd
        text: NPE KnowledgeBase
      - href: cv/index.qmd
        text: CV
      - href: contact.qmd
        text: Contact
    right:
      - text: LinkedIn
        href: https://www.linkedin.com/in/connorconkeymorrison

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    smooth-scroll: true
    include-in-header:
      text: |
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="/favicon.ico">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          var s = getComputedStyle(document.documentElement);
          window.CCM_COLORS = {
            navy:      s.getPropertyValue('--navy').trim()       || '#1a2e4a',
            navyLight: s.getPropertyValue('--navy-light').trim() || '#2a4a6a',
            accent:    s.getPropertyValue('--accent').trim()     || '#c8922a',
            bg:        s.getPropertyValue('--bg').trim()         || '#f8f7f5',
            bgCard:    s.getPropertyValue('--bg-card').trim()    || '#ffffff',
            textMuted: s.getPropertyValue('--text-muted').trim() || '#5c5c5c',
            border:    s.getPropertyValue('--border').trim()     || '#e4e1da',
            tagBg:     s.getPropertyValue('--tag-bg').trim()     || '#eef2f8',
            radius:    s.getPropertyValue('--radius').trim()     || '12px',
          };
        });
        </script>
